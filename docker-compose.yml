services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${OLLAMA_CONTAINER_NAME:-ollama}
    volumes:
      - ${OLLAMA_DATA_VOLUME:-ollama_data}:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  hermes:
    image: hermes-agent:latest
    container_name: ${HERMES_CONTAINER_NAME:-hermes-agent}
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GEMINI_DATA_PATH:-gemini_data}:/root/.gemini
      - ${OBSIDIAN_VAULT_PATH:-/mnt/c/Users/saoflfer/Documents/obsidian/flv_fit_vault}:/knowledge
    env_file: .env
    depends_on:
      - ollama
    ports:
      - "${OAUTH_PORT:-8080}:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_NOPRELOAD=1
    stdin_open: true
    tty: true

volumes:
  ollama_data:
  gemini_data:
